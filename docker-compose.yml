version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - BACKEND_URL_INTERNAL=http://careersync-backend:8000
      - DATABASE_URL=postgresql://postgres:careersync_prod_safe@db:5432/careersync
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_URL_INTERNAL=http://frontend:3000
    depends_on:
      - backend
    networks:
      - careersync_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careersync-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:careersync_prod_safe@db:5432/careersync
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis
    networks:
      - careersync_net

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=careersync_prod_safe
      - POSTGRES_DB=careersync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careersync_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - careersync_net

networks:
  careersync_net:
    driver: bridge

volumes:
  postgres_data:
